<!doctype html>
<html>
    <head>
        <title>Courses UI</title>
    </head>
    <body>
        <h2>Listing Courses - <span id="count">0</span></h2>
        <button onclick="handleClick()">fetch courses</button>
        <ul id="list"></ul>

        <script>
            // const ulTag = document.getElementById('list');
            const ulTag = document.querySelector("#list");

            // Need to manage this everywhere in Vanilla JS
            const countHandle = document.querySelector("#count");

            function handleClick() {
                const xhr = new XMLHttpRequest();

                // Initialize a GET request to fetch the list of courses from the server
                xhr.open("GET", "http://localhost:4000/courses");

                // Send the request to the server -- this will trigger the onload or onerror callback based on the response
                xhr.send();

                // Success response
                xhr.onload = function () {
                    ulTag.innerHTML = ""; // clear the list before adding new courses

                    // Parse the response from the server and extract the list of courses
                    const result = xhr.responseText;
                    // console.log("Result:", result);
                    const courses = JSON.parse(result);

                    // Update the count of courses
                    countHandle.textContent = courses.length;

                    // Display courses in the UI
                    for (let course of courses) {
                        const liTag = document.createElement("li");
                        liTag.textContent = course.title;
                        ulTag.appendChild(liTag);
                    }
                };

                // Error response
                xhr.onerror = function () {};
            }
        </script>
    </body>
</html>
